<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-box">

                    <input type="radio" id="tab1" name="tab" checked>
                    <input type="radio" id="tab2" name="tab">
                    <div class="tabs d-flex justify-content-around mb-3">
                        <label for="tab1" class="tab-btn">Password</label>
                        <label for="tab2" class="tab-btn">Phone Number</label>
                    </div>

                    <div class="form-content">
                        <div id="password-form" class="form-section">
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Please enter your Phone or Email">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" placeholder="Please enter your password">
                            </div>
                            <div class="mb-3 text-end">
                                <a href="#" class="text-decoration-none">Forgot password?</a>
                            </div>
                            <button class="login-btn">LOGIN</button>
                        </div>

                        <div id="phone-form" class="form-section">
                            <div class="input-group mb-3">
                                <span class="input-group-text">PK +92</span>
                                <input type="text" class="form-control" placeholder="Please enter your phone number">
                            </div>
                            <button class="login-btn d-flex align-items-center justify-content-center gap-2">
                                <img src="https://img.icons8.com/color/24/whatsapp--v1.png" />
                                Send code via Whatsapp
                            </button>
                        </div>
                    </div>

                    <div class="text-center mt-3">
                        Don’t have an account? <a href="./signp.html" target="_blank">Sign up</a>
                    </div>

                    <div class="text-center mt-3">
                        <div class="social-btns">
                            Or, login with <br>
                            <div class="d-flex justify-content-center gap-2 mt-2 flex-wrap">
                                <a href="https://www.google.com/" target="_blank"
                                    class="btn btn-light border d-flex align-items-center gap-2">
                                    <img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" />
                                    Google
                                </a>
                                <a href="https://www.facebook.com/" target="_blank"
                                    class="btn btn-light border d-flex align-items-center gap-2">
                                    <i class="fa-brands fa-facebook"></i>
                                    Facebook
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
