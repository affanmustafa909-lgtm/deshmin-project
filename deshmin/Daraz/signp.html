<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  
  <div class="container">
    <div class="signup-box">
      <h5 class="text-center mb-3">Sign up</h5>
      <div class="input-group mb-3">
        <span class="input-group-text">PK +92</span>
        <input type="text" class="form-control" placeholder="Please enter your phone number">
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="agreeCheck">
        <label class="form-check-label terms-text" for="agreeCheck">
          By creating and/or using your account, you agree to our
          <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.
        </label>
      </div>
      <button class="signup-btn mb-3 w-100">
        <a href="https://www.whatsapp.com/" target="_blank">
          <i class="fa-brands fa-whatsapp"></i>
          Send code via Whatsapp
        </a>
      </button>
      <div class="text-center mb-3">
        Already have an account? <a href="./login.html" target="_blank">Log in Now</a>
      </div>
      <div class="text-center">
        Or, sign up with <br>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-2">
          <button class="btn btn-light border social-btn flex-fill">
            <a href="https://www.google.com/" target="_blank">
              <img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" />
              Google
            </a>
          </button>
          <button class="btn btn-light border social-btn flex-fill">
            <a href="https://www.facebook.com/" target="_blank">
              <i class="fa-brands fa-facebook"></i>
              Facebook
            </a>
          </button>
        </div>
      </div>
    </div>
  </div>












</body>

</html>
